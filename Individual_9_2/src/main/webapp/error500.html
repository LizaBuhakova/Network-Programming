<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #d63031;
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #4361ee;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        a:hover {
            background: #3451db;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <p>Internal server error</p>
        <a href="index.html">Back to Home</a>
    </div>
</body>
</html>
