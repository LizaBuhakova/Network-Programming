<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Customer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .customer-select {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        label {
            display: block;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        select {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            border: 2px solid #4361ee;
            border-radius: 5px;
            background: white;
            color: #333;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        select:focus {
            outline: none;
            border-color: #3451db;
        }
        
        button {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        button:hover {
            background: #3451db;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4361ee;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Customer</h1>
        
        <div class="customer-select">
            <label for="customerId">Choose a customer:</label>
            <select id="customerId">
                <option value="">Loading...</option>
            </select>
            <button onclick="viewCustomer()">View Orders</button>
            <a href="index.html" class="back-link">Back to All Customers</a>
        </div>
    </div>

    <script>
        const API_BASE = '/customer-orders-app/api/customers';
        
        async function loadCustomers() {
            const select = document.getElementById('customerId');
            
            try {
                const response = await fetch(API_BASE);
                const customers = await response.json();
                
                select.innerHTML = '<option value="">Select a customer...</option>' +
                    customers.map(c => 
                        `<option value="${c.id}">${c.fullName}</option>`
                    ).join('');
                
            } catch (err) {
                select.innerHTML = '<option value="">Error loading</option>';
                console.error('Error:', err);
            }
        }
        
        function viewCustomer() {
            const customerId = document.getElementById('customerId').value;
            if (customerId) {
                window.location.href = `customer-detail.html?id=${customerId}`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
</body>
</html>
